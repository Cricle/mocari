<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live2D - Mocari</title>
    <script type="module">
    import init, { main } from '/web_demo.js';
    await init();
    main();
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #fff;
            overflow: hidden;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.6);
            margin-bottom: 1.2rem;
        }
        #container {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(100,149,237,0.15);
        }
        canvas {
            display: block;
            width: min(90vw, 90vh);
            height: min(90vw, 90vh);
            background: #16162a;
        }
        #stats {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(8px);
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 11px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            color: rgba(255,255,255,0.75);
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.08);
            line-height: 1.6;
            white-space: pre;
        }
        #model-selector {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(12px);
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.1);
            max-width: calc(100vw - 32px);
            overflow-x: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.2) transparent;
        }
        #model-selector::-webkit-scrollbar {
            height: 6px;
        }
        #model-selector::-webkit-scrollbar-track {
            background: transparent;
        }
        #model-selector::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
        }
        #model-selector::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.3);
        }
        #model-selector button {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.7);
            padding: 7px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.25s ease;
            letter-spacing: 0.5px;
        }
        #model-selector button:hover {
            background: rgba(255,255,255,0.15);
            color: #fff;
            transform: translateY(-1px);
        }
        #model-selector button.active {
            background: linear-gradient(135deg, rgba(100,149,237,0.7), rgba(140,100,237,0.7));
            border-color: transparent;
            color: #fff;
            box-shadow: 0 4px 15px rgba(100,149,237,0.3);
        }
        #upload-btn {
            background: linear-gradient(135deg, rgba(100,200,100,0.7), rgba(80,180,80,0.7));
            border-color: transparent;
            color: #fff;
        }
        #upload-btn:hover {
            background: linear-gradient(135deg, rgba(100,200,100,0.9), rgba(80,180,80,0.9));
        }
        #file-input {
            display: none;
        }
        .upload-status {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            padding: 24px 36px;
            border-radius: 14px;
            font-size: 14px;
            color: #fff;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .upload-status.show {
            display: flex;
        }
        #loading {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: rgba(22,22,42,0.92);
            backdrop-filter: blur(4px);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        #loading.show { opacity: 1; }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(255,255,255,0.15);
            border-top-color: rgba(100,149,237,0.8);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading span {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .hint {
            margin-top: 1rem;
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <h1>Mocari Live2D</h1>
    <div id="container">
        <canvas id="live2d" width="900" height="900"></canvas>
        <div id="stats"></div>
        <div id="loading"><div class="spinner"></div><span>Loading</span></div>
        <div id="model-selector">
            <button class="active" data-model="Haru">Haru</button>
            <button data-model="Hiyori">Hiyori</button>
            <button data-model="Mao">Mao</button>
            <button data-model="Mark">Mark</button>
            <button data-model="Natori">Natori</button>
            <button data-model="Ren">Ren</button>
            <button data-model="Rice">Rice</button>
            <button data-model="Wanko">Wanko</button>
            <button id="upload-btn">Upload PNG</button>
            <input type="file" id="file-input" accept="image/png,image/jpeg" />
        </div>
        <div id="upload-status" class="upload-status">
            <div class="spinner"></div>
            <span>Generating model...</span>
        </div>
    </div>
    <p class="hint">Move mouse to interact &middot; Click model to switch &middot; Upload PNG to generate model</p>
</body>
</html>
